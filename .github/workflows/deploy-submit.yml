name: Deploy & Submit to Search Engines

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  submit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build and generate URL list
        run: npx astro build && npx tsx scripts/export-urls.ts && npx tsx scripts/check-seo.ts
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
      - name: Wait for site to be live
        run: npx tsx scripts/wait-deploy.ts
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
      - name: Submit URLs to search engines
        run: npx tsx scripts/submit-indexnow.ts && npx tsx scripts/submit-baidu.ts && npx tsx scripts/ping-sitemaps.ts
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BAIDU_SITE: ${{ secrets.BAIDU_SITE }}
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
